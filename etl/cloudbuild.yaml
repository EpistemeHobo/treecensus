# Build and deploy the ETL service to Cloud Run.
#
# From repo root:
#   gcloud builds submit --config etl/cloudbuild.yaml etl
#
# Optional: override defaults at submit time:
#   --substitutions=_REGION=us-central1,_DATASET=tree_census,_TAG=v0.1.0

substitutions:
  _SERVICE: treecensus-etl
  _REGION: asia-southeast3
  _DATASET: tree_census
  # Image tag. Defaults to "latest" for manual submits; Cloud Build triggers
  # can pass --substitutions=_TAG=$SHORT_SHA to tag by commit.
  _TAG: latest

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args: ["build", "-t", "gcr.io/$PROJECT_ID/$_SERVICE:$_TAG", "."]

  - name: gcr.io/cloud-builders/docker
    id: push
    args: ["push", "gcr.io/$PROJECT_ID/$_SERVICE:$_TAG"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=gcr.io/$PROJECT_ID/$_SERVICE:$_TAG
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,BIGQUERY_DATASET=$_DATASET
      - --set-secrets=ZOHO_WEBHOOK_SECRET=zoho-webhook-secret:latest
      # When OAuth secrets exist, extend the line above with:
      #   ,ZOHO_OAUTH_CLIENT_ID=zoho-oauth-client-id:latest,ZOHO_OAUTH_CLIENT_SECRET=zoho-oauth-client-secret:latest,ZOHO_OAUTH_REFRESH_TOKEN=zoho-oauth-refresh-token:latest

images:
  - gcr.io/$PROJECT_ID/$_SERVICE:$_TAG

options:
  logging: CLOUD_LOGGING_ONLY
