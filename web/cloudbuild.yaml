# Build and deploy the web portal to Cloud Run.
#
# From repo root:
#   gcloud builds submit --config web/cloudbuild.yaml web

substitutions:
  _SERVICE: treecensus-portal
  _REGION: asia-southeast3
  _TAG: latest

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args: ["build", "-t", "gcr.io/$PROJECT_ID/$_SERVICE:$_TAG", "."]

  - name: gcr.io/cloud-builders/docker
    id: push
    args: ["push", "gcr.io/$PROJECT_ID/$_SERVICE:$_TAG"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=gcr.io/$PROJECT_ID/$_SERVICE:$_TAG
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,BIGQUERY_DATASET=tree_census

images:
  - gcr.io/$PROJECT_ID/$_SERVICE:$_TAG

options:
  logging: CLOUD_LOGGING_ONLY
